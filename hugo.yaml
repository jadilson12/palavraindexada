# Hugo configuration file

segments:
  recent:
    includes:
      - kind: "{home,section,taxonomy,term}"
      - path: "{/2025/**,/2026/**,/2027/**,/about,/archives}"

title: Palavra Indexada
enableEmoji: true
languageCode: pt-BR
defaultContentLanguage: pt-br
baseURL: "https://palavraindexada.netlify.app/"

languages:
  pt-br:
    languageName: "Portugues"
    weight: 1

outputs:
  home: [HTML, RSS]

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Theme
      weight: 0
      params:
        type: theme-toggle
    - name: Sobre
      pageRef: /sobre
      weight: 1
    - name: RSS
      weight: 2
      url: /index.xml
      params:
        icon: rss

params:
  theme:
    default: "light"
    displayToggle: true

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false

  youtubeDefaults:
    iframeAllowList: "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy: "no-referrer"
    iframeStyle: "border:0; width:100%; aspect-ratio:16/9;"

  author:
    name: Jadilson Guedes
    email: jadilson12@gmail.com

  description: "Blog do Jadilson Guedes sobre estudo, organização e compartilhamento do conhecimento bíblico e teológico."

  # Imagem padrão Open Graph / Twitter quando a página não define `images` nem `youtube_id`
  images:
    - /favicon.svg
